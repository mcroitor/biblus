services:
  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/var/www/html:ro
  backend:
    image: php:8.4-fpm
    volumes:
      - ./docker/php.ini:/usr/local/etc/php/conf.d/90-php.ini:ro
      - ./backend:/var/www/html
      - ./uploads:/var/www/html/uploads
      - workdir:/workdir

volumes:
  workdir: {}